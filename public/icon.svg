<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="chickenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base (Rounded Android/iOS adaptive style) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Outer Decorative Ring -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="url(#accentGrad)" stroke-width="4" opacity="0.3" stroke-dasharray="16 8" />

  <!-- Stylized Chicken Emblem (Franguinho da Vila) -->
  <g transform="translate(256, 236) scale(1.1)" filter="url(#glow)">
    <!-- Body/Base -->
    <path d="M-80,40 C-80,100 80,100 80,40 C80,20 60,0 20,-10 C-20,-10 -80,-10 -80,40 Z" fill="url(#chickenGrad)" />
    
    <!-- Wing -->
    <path d="M-50,35 C-30,55 30,55 50,35 C30,15 -10,15 -50,35 Z" fill="#b91c1c" opacity="0.8" />
    
    <!-- Tail Feathers -->
    <path d="M-80,30 C-110,20 -110,-20 -70,-10 C-60,-5 -50,15 -80,30 Z" fill="#ea580c" />
    <path d="M-75,10 C-100,-10 -90,-40 -60,-20 C-50,-10 -45,5 -75,10 Z" fill="#f97316" />
    
    <!-- Neck & Head -->
    <path d="M30,5 C45,-15 50,-40 45,-60 C40,-80 70,-80 75,-60 C80,-40 60,-15 45,5 Z" fill="url(#chickenGrad)" />
    
    <!-- Beak -->
    <path d="M72,-68 L95,-60 L70,-52 Z" fill="#f59e0b" />
    
    <!-- Comb (Cresta) -->
    <path d="M52,-75 C52,-90 62,-92 65,-80 C68,-92 78,-90 75,-75 Z" fill="#ef4444" />
    
    <!-- Eye -->
    <circle cx="56" cy="-60" r="5" fill="#0f172a" />
    <circle cx="58" cy="-62" r="1.5" fill="#ffffff" />
    
    <!-- Chef Hat -->
    <g transform="translate(42, -100) scale(0.6)">
      <path d="M10,25 C10,10 25,10 25,15 C25,5 45,5 45,15 C45,10 60,10 60,25 L60,35 L10,35 Z" fill="#ffffff" />
      <rect x="15" y="33" width="40" height="8" rx="2" fill="#e2e8f0" />
    </g>
  </g>

  <!-- Typography Inside Icon -->
  <text x="256" y="430" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">
    FRANGUINHO
  </text>
  <text x="256" y="465" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#f97316" text-anchor="middle" letter-spacing="6">
    DA VILA
  </text>
</svg>
